    <link rel="stylesheet" href="css/vendors/simplebar.css">

  <body>
    <div class="bg-body-tertiary min-vh-100 d-flex flex-row align-items-center">
      <div class="container" style="max-width: 32rem">
        <div class="d-flex flex-column gap-4">
          <div class="text-center">
            <img class="img-fluid" id="loginLogo" src="/assets/logo/tandem-logo.png" alt="Thika Tandem Paracycling Club">
            <h3 class="mt-3 mb-1">Thika Tandem Paracycling Club</h3>
            <p class="text-body-secondary mb-0">Federation Management System</p>
          </div>
          <div class="card p-4">
            <div class="card-body d-flex flex-column gap-4">
              <h2 class="h5 text-center">Login to your account</h2>
              <form class="row gap-3" id="loginForm" autocomplete="off" novalidate>
                <div>
                  <label class="form-label" for="email">Email address</label>
                  <input class="form-control" id="email" type="email" placeholder="your@email.com" autocomplete="email" required>
                </div>
                <div>
                  <div class="d-flex justify-content-between">
                    <label class="form-label" for="password">Password</label>
                    <a href="./authentication/reset-password.html">I forgot password</a>
                  </div>
                  <div class="input-group">
                    <input class="form-control" id="password" type="password" placeholder="Your password" autocomplete="current-password" required>
                    <span class="input-group-text">
                      <button class="bg-transparent border-0 p-0 link-secondary" type="button" data-coreui-toggle="tooltip" aria-label="Show password" data-coreui-original-title="Show password">
                        <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                          <path class="ci-primary" fill="var(--ci-primary-color, currentcolor)" d="M256 144.927a103.309 103.309 0 1 0 103.309 103.309A103.426 103.426 0 0 0 256 144.927m0 174.618a71.309 71.309 0 1 1 71.309-71.309A71.39 71.39 0 0 1 256 319.545"></path>
                          <path class="ci-primary" fill="var(--ci-primary-color, currentcolor)" d="m397.222 131.1-.218-.223c-77.75-77.749-204.258-77.749-282.008 0L16 233.79v28.893l98.778 102.689.218.222a199.41 199.41 0 0 0 282.008 0l99-102.911V233.79ZM464 249.79l-89.732 93.285a167.41 167.41 0 0 1-236.536 0L48 249.79v-3.107l89.729-93.283c65.247-65.13 171.3-65.13 236.542 0L464 246.683Z"></path>
                          <path class="ci-primary" fill="var(--ci-primary-color, currentcolor)" d="M240 232h32v32h-32z"></path>
                        </svg>
                      </button>
                    </span>
                  </div>
                </div>
                <div>
                  <label class="form-check">
                    <input class="form-check-input" type="checkbox">
                    <span class="form-check-label">Remember me on this device</span>
                  </label>
                </div>
                <div>
                  <button class="btn btn-primary w-100" id="loginButton" type="submit">
                    <Sign>in</Sign>
                  </button>
                  <div class="alert alert-danger d-none mt-3" id="loginMessage"></div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- CoreUI and necessary plugins-->
    <script src="node_modules/@coreui/coreui/dist/js/coreui.bundle.min.js"></script>
    <script src="node_modules/simplebar/dist/simplebar.min.js"></script>
    <!-- Supabase Library-->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase.js"></script>
    <script>
      const header = document.querySelector("header.header");

      document.addEventListener("scroll", () => {
        if (header) {
          header.classList.toggle("shadow-sm", document.documentElement.scrollTop > 0);
        }
      });
    </script>
    <script type="module">
      import { initializeAuthentication } from "/js/core/auth/authInitializer.js";

      initializeAuthentication();
    </script>
    <script type="module" src="/js/core/auth/login.js"></script>
    <script>
      const tooltipTriggerList = document.querySelectorAll('[data-coreui-toggle="tooltip"]');
      const tooltipList = [...tooltipTriggerList].map((tooltipTriggerEl) => new coreui.Tooltip(tooltipTriggerEl));
    </script>
  </body>
</html>
